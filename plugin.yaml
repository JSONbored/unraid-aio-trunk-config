    - node@22.16.0
    - python@3.10.8

lint:
  enabled:
    - actionlint@1.7.12
    - bandit@1.9.4
    - black@26.3.1
    - checkov@3.2.524
    - git-diff-check
    - hadolint@2.14.0
    - isort@8.0.1
    - markdownlint@0.48.0
    - oxipng@10.1.0
    - prettier@3.8.3
    - renovate@43.138.3
    - ruff@0.15.11
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - taplo@0.10.0
